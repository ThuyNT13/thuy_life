name: S3-sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # required for requesting the JWT for OpenID Connect (OIDC)
  contents: read  # required for actions/checkout

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-slim
    environment: production

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Git checkout repository
        uses: actions/checkout@v4

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActions
          role-session-name: ${{ github.event.repository.name }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: sync to AWS S3
        run: |
          aws s3 sync . s3://${{ vars.S3_BUCKET }} \
            --delete \
            --size-only \
            --exclude ".github/*" \
            --exclude "README.md" \
            --exclude "LICENSE"

      - name: invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CF_DISTRIBUTION_ID }} \
            --paths "/*"
